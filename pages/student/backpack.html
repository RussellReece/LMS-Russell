<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Cloud Backpack</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom Styles -->
    <link href="../../assets/css/style.css" rel="stylesheet">
    <style>
        .folder-tree {
            list-style-type: none;
            padding-left: 20px;
        }
        .folder-tree li {
            margin: 8px 0;
            position: relative;
        }
        .folder-tree li::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: -12px;
            width: 1px;
            background-color: var(--border-hairline);
        }
        .folder-tree li::after {
            content: '';
            position: absolute;
            top: 12px;
            left: -12px;
            width: 10px;
            height: 1px;
            background-color: var(--border-hairline);
        }
        .file-icon {
            color: var(--text-secondary);
        }
        .folder-icon {
            color: #FFCA28; /* Yellow folder */
        }
        .oauth-card {
            border: 1px solid var(--border-hairline);
            border-radius: var(--radius-card);
            background-color: var(--bg-canvas);
            transition: transform 0.2s;
        }
        .oauth-card:hover {
            transform: translateY(-2px);
            border-color: var(--color-primary);
        }
    </style>
</head>
<body data-theme="academic">

    <div class="d-flex w-100 h-100">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="height: 100vh; overflow-y: auto; background-color: var(--bg-canvas);">
            <!-- Navbar Container -->
            <div id="navbar-container"></div>

            <div class="container py-4 px-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold mb-1" style="color: var(--text-primary);"><i class="ph-duotone ph-backpack me-2"></i>Cloud Backpack</h3>
                        <p class="text-muted small mb-0">Tas digital 0-byte. Semua progress mata pelajaranmu tersimpan otomatis dan rapi di cloud pribadimu.</p>
                    </div>
                </div>

                <div class="row">
                    <!-- Integrasi OAuth -->
                    <div class="col-md-5 mb-4">
                        <div class="card border-0 p-4 h-100" style="background-color: var(--color-surface); border-radius: var(--radius-card);">
                            <h6 class="fw-bold mb-3">Integrasi Penyimpanan</h6>
                            
                            <div class="oauth-card p-3 mb-3 d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Google Drive" width="24" class="me-3">
                                    <div>
                                        <div class="fw-bold" style="font-size: 14px;">Google Workspace</div>
                                        <div id="gdrive-status" class="small text-muted">Belum terhubung</div>
                                    </div>
                                </div>
                                <button id="btn-connect-gdrive" class="btn btn-sm btn-outline-primary" style="border-radius: var(--radius-btn);">Tautkan</button>
                            </div>

                            <div class="oauth-card p-3 d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Microsoft_Office_OneDrive_%282019%E2%80%93present%29.svg" alt="OneDrive" width="24" class="me-3">
                                    <div>
                                        <div class="fw-bold" style="font-size: 14px;">Microsoft 365</div>
                                        <div class="small text-muted">Belum terhubung</div>
                                    </div>
                                </div>
                                <button class="btn btn-sm btn-outline-secondary" disabled style="border-radius: var(--radius-btn);">Tautkan</button>
                            </div>
                        </div>
                    </div>

                    <!-- Visualisasi Struktur Folder -->
                    <div class="col-md-7 mb-4">
                        <div class="card border-0 p-4 h-100" style="background-color: var(--color-surface); border-radius: var(--radius-card);">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold mb-0">Struktur Tas Digital</h6>
                                <button id="btn-sim-enroll" class="btn btn-sm btn-primary d-none" style="border-radius: var(--radius-btn);"><i class="ph-bold ph-plus"></i> Enroll Matkul Baru</button>
                            </div>

                            <div id="backpack-tree-container" class="p-3 rounded" style="background-color: var(--bg-canvas); min-height: 200px; overflow-x: auto;">
                                <div class="text-center text-muted small py-5" id="backpack-empty-state">
                                    <i class="ph-duotone ph-cloud-slash display-4 mb-2"></i>
                                    <p>Tautkan akun cloud Anda terlebih dahulu untuk melihat struktur file.</p>
                                </div>
                                <ul class="folder-tree d-none" id="backpack-tree" style="margin-left: 0; padding-left: 0;">
                                    <!-- Tree akan diinjeksi via app.js -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Logic -->
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
