<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Grades Report</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body data-theme="academic">

    <div class="d-flex w-100 h-100">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="height: 100vh; overflow-y: auto; background-color: var(--bg-canvas);">
            <!-- Navbar Container (Diinjeksi via JS) -->
            <div id="navbar-container"></div>

            <div class="container py-4 px-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold mb-0" style="color: var(--text-primary);"><i class="ph-duotone ph-exam me-2"></i>Laporan Penilaian</h3>
                </div>

                <div class="card border-0 p-4" style="background-color: var(--color-surface); border-radius: var(--radius-card);">
                    <div id="grading-visualization-container">
                        <!-- Konten akan di-inject oleh app.js (Radar Chart atau Transcript Table) -->
                        <div class="text-center py-5 text-muted small">
                            <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div>
                            <div>Menghitung kalkulasi nilai...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Logic -->
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
