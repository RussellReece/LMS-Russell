<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 flex-grow-1 d-flex flex-column">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 py-2">
                <div class="nav nav-tabs border-bottom mb-4" id="nav-tab" role="tablist">
                    <button class="nav-link active fw-bold px-4" id="nav-active-courses-tab" data-bs-toggle="tab" data-bs-target="#nav-active-courses" type="button" role="tab" style="color: var(--color-primary); border-bottom: 2px solid var(--color-primary);">My Courses</button>
                    <button class="nav-link fw-semibold px-4 text-muted border-0" id="nav-distribution-tab" data-bs-toggle="tab" data-bs-target="#nav-distribution" type="button" role="tab">Course Distribution</button>
                </div>
                
                <div class="tab-content" id="nav-tabContent">
                    <div class="tab-pane fade show active" id="nav-active-courses" role="tabpanel">
                        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                            <div id="filter-buttons-container" class="d-flex gap-2">
                                </div>
                            <select class="form-select form-select-sm w-auto shadow-sm" style="border-radius: var(--radius-btn);">
                                <option>2026, Even Semester</option>
                            </select>
                        </div>
                        <div class="row" id="course-list-container"></div>
                    </div>
                    
                    <div class="tab-pane fade" id="nav-distribution" role="tabpanel">
                        <h4 class="fw-bold mb-4" style="color: #0088cc;">COURSE DISTRIBUTION</h4>
                        <div id="course-distribution-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
