<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Dashboard - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body data-theme="kids">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 flex-grow-1 d-flex flex-column">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 py-4">
                <div class="card border-0 mb-5" style="background-color: var(--color-surface); border-radius: 24px;">
                    <div class="card-body p-5 text-center">
                        <div class="d-inline-flex bg-white rounded-circle align-items-center justify-content-center mb-3 shadow-sm"
                            style="width: 80px; height: 80px;">
                            <i class="ph-fill ph-shooting-star display-4" style="color: var(--color-primary);"></i>
                        </div>
                        <h1 class="fw-bold mb-2" style="color: var(--text-primary); font-size: 42px;">Halo, <span
                                id="welcomeName">Student</span>!</h1>
                        <p style="color: var(--text-secondary); font-size: 18px;">Ayo mulai petualangan belajarmu hari
                            ini!</p>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="card grid-item-progress">
                        <div class="card-header border-0 pt-4 pb-0 bg-transparent">
                            <h5 class="fw-bold" style="color: var(--text-primary);">Progress Belajar</h5>
                        </div>
                        <div class="card-body" id="progress-container">
                        </div>
                    </div>

                    <div class="card grid-item-class">
                        <div class="card-header border-0 pt-4 pb-0 bg-transparent">
                            <h5 class="fw-bold" style="color: var(--text-primary);">Jadwal Hari Ini</h5>
                        </div>
                        <div class="card-body" id="schedule-container">
                        </div>
                    </div>

                    <div class="card grid-item-tasks">
                        <div class="card-header border-0 pt-4 pb-0 bg-transparent">
                            <h5 class="fw-bold" style="color: var(--text-primary);">Tugas Belum Selesai</h5>
                        </div>
                        <div class="card-body">
                            <div class="list-group list-group-flush" id="uncompleted-tasks-container">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/dashboard.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>

</html>
