<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - CollabSpace</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom Styles -->
    <link href="../../assets/css/style.css" rel="stylesheet">
    <style>
        .block-editor {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            border-radius: var(--radius-card);
            min-height: 400px;
            padding: 24px;
        }
        .block-h2 {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .block-p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        .block-item {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            position: relative;
        }
        .block-item:hover {
            background-color: rgba(0,0,0,0.02);
            border-color: var(--border-hairline);
        }
        .block-diff-modified {
            background-color: rgba(255, 193, 7, 0.1) !important;
            border-left: 3px solid #ffc107 !important;
        }
        .block-diff-added {
            background-color: rgba(40, 167, 69, 0.1) !important;
            border-left: 3px solid #28a745 !important;
        }
        .embed-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-card);
            border: 1px solid var(--border-hairline);
        }
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body data-theme="academic">

    <div class="d-flex w-100 h-100">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="height: 100vh; overflow-y: auto; background-color: var(--bg-canvas);">
            <!-- Navbar Container -->
            <div id="navbar-container"></div>

            <div class="container py-4 px-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <div class="badge bg-primary mb-2">CollabSpace (Beta)</div>
                        <h3 class="fw-bold mb-0" id="collab-doc-title">Dokumen Kelompok</h3>
                    </div>
                    <div class="d-flex gap-2">
                        <span class="badge d-flex align-items-center" style="background-color: var(--color-surface); color: var(--text-primary); border: 1px solid var(--border-hairline);">
                            <i class="ph-fill ph-git-branch text-success me-2 fs-5"></i> Split View Active
                        </span>
                        <button id="btn-merge" class="btn btn-success" style="border-radius: var(--radius-btn);"><i class="ph-bold ph-git-merge me-2"></i>Merge to Main</button>
                    </div>
                </div>

                <!-- Split View Branching -->
                <div class="row mb-5">
                    <div class="col-md-6">
                        <div class="card border-0 h-100 shadow-sm" style="border-radius: var(--radius-card);">
                            <div class="card-header bg-transparent border-bottom border-hairline py-3 d-flex align-items-center justify-content-between">
                                <span class="fw-bold"><i class="ph-duotone ph-file-text me-2"></i>Main Branch</span>
                                <span class="badge bg-secondary">Current Version</span>
                            </div>
                            <div class="card-body p-0">
                                <div id="main-branch-editor" class="block-editor">
                                    <!-- Blocks injected by JS -->
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card border-0 h-100 shadow-sm" style="border-radius: var(--radius-card); border: 1px solid #ffc107 !important;">
                            <div class="card-header bg-transparent py-3 d-flex align-items-center justify-content-between" style="border-bottom: 1px solid #ffc107;">
                                <span class="fw-bold"><i class="ph-duotone ph-git-commit me-2 text-warning"></i><span id="member-branch-name">Branch</span></span>
                                <span class="badge bg-warning text-dark">Proposed Changes</span>
                            </div>
                            <div class="card-body p-0">
                                <div id="member-branch-editor" class="block-editor">
                                    <!-- Blocks injected by JS -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Universal Embeds Section -->
                <h5 class="fw-bold mb-3 mt-5"><i class="ph-duotone ph-link me-2"></i>Universal Embeds</h5>
                <div class="card border-0 p-4" style="background-color: var(--color-surface); border-radius: var(--radius-card);">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted">Paste Canva, Figma, or Miro Link</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent" style="border-color: var(--border-hairline);"><i class="ph ph-link"></i></span>
                                <input type="text" class="form-control" style="border-color: var(--border-hairline); background-color: var(--bg-canvas);" placeholder="https://www.figma.com/file/..." disabled value="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Ffile%2Fdummy">
                                <button class="btn btn-outline-primary" type="button">Embed</button>
                            </div>
                        </div>
                        <div class="col-md-12 mt-3">
                            <div class="embed-container">
                                <!-- Dummy iframe representing an embedded Figma file -->
                                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                            </div>
                            <p class="text-center small mt-2 text-muted">Note: Using YouTube iframe for demonstration purposes as actual Figma embeds require authentication/CORS.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Logic -->
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
