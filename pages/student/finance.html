<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100 flex-grow-1 d-flex flex-column">
            <!-- Navbar Container -->
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 py-4">
                <h3 class="fw-bold mb-4" style="color: var(--text-primary);">Finance Information</h3>

                <!-- Summary Section -->
                <div class="card p-4 mb-4 border-0 shadow-sm" style="border-radius: var(--radius-card); background-color: var(--color-surface);">
                    <div id="finance-summary-container">
                        <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>
                    </div>
                </div>

                <!-- Table Controls -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex align-items-center">
                        <span class="me-2 text-muted small">Show</span>
                        <select class="form-select form-select-sm" style="width: 70px; border-radius: var(--radius-btn);">
                            <option>10</option>
                            <option>25</option>
                        </select>
                        <span class="ms-2 text-muted small">entries</span>
                    </div>
                    <div>
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <input type="text" class="form-control" placeholder="Search..." style="border-radius: var(--radius-btn) 0 0 var(--radius-btn);">
                            <button class="btn text-white" style="background-color: #aaa; border-radius: 0 var(--radius-btn) var(--radius-btn) 0;"><i class="ph-bold ph-magnifying-glass"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Table Section -->
                <div id="finance-table-container">
                    <div class="text-center py-5 text-muted small">
                        <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div>
                        <div>Memuat data keuangan...</div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>const currentPage = 'finance';</script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
