<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper" class="w-100 flex-grow-1 d-flex flex-column">
            <div id="navbar-container"></div>
            <div class="container-fluid px-4 py-4">
                
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <span id="course-status-badge" class="badge mb-2 d-none" style="background-color: var(--color-surface); color: var(--color-primary); border: 1px solid var(--border-hairline);">Sesi Berlangsung</span>
                        <h2 id="course-detail-title" class="fw-bold mb-1" style="color: var(--text-primary);">Loading...</h2>
                        <p id="course-detail-lecturer" class="mb-0" style="color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- KOLOM TUNGGAL: Timeline Materi & Absensi (Lebih Bersih & Lega) -->
                    <div class="col-12 col-lg-10 mx-auto">
                        <div class="card p-4 h-100 border-0 shadow-sm">
                            <h5 class="fw-bold mb-4" style="color: var(--text-primary);">Materi & Aktivitas</h5>
                            <!-- Penampung Syllabus Accordion Dinamis -->
                            <div class="accordion syllabus-accordion" id="courseAccordion"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
