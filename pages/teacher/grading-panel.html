<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Grading Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom Styles -->
    <link href="../../assets/css/style.css" rel="stylesheet">
</head>
<body data-theme="teacher">

    <div class="d-flex w-100 h-100">
        <!-- Sidebar Container -->
        <div id="sidebar-container-desktop" class="d-none d-md-block flex-shrink-0"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 d-flex flex-column" style="height: 100vh; overflow-y: auto; background-color: var(--bg-canvas);">
            <!-- Navbar Container (Diinjeksi via JS) -->
            <div id="navbar-container"></div>

            <div class="container-fluid py-4 px-md-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h3 class="fw-bold mb-1" style="color: var(--text-primary);"><i class="ph-fill ph-check-square-offset me-2 text-warning"></i>Data Center Penilaian</h3>
                        <p class="small mb-0 text-muted">Input dan rekapitulasi nilai akhir siswa berdasarkan evaluasi formatif dan sumatif.</p>
                    </div>
                    <button class="btn btn-sm btn-outline-warning" style="border-radius: var(--radius-btn);"><i class="ph ph-export"></i> Ekspor CSV</button>
                </div>

                <div class="card border-0 rounded-3 mb-4" style="background-color: var(--color-surface);">
                    <div id="teacher-grading-table-container" class="table-responsive p-0 m-0">
                        <!-- Data Table diinjeksi via JS -->
                        <div class="text-center py-5 text-muted small">
                            <div class="spinner-border spinner-border-sm text-warning mb-2" role="status"></div>
                            <div>Menghubungkan ke secure server...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Application Logic -->
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
        const sidebarDesk = document.getElementById('sidebar-container-desktop');
        if(sidebarDesk) {
            const userStr = sessionStorage.getItem('loggedInUser');
            if(userStr) {
               sidebarDesk.innerHTML = renderSidebar('grading-panel', JSON.parse(userStr));
            }
        }
    </script>
</body>
</html>
