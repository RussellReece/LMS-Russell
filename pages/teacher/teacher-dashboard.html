<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body data-theme="teacher">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>
        <div id="page-content-wrapper" class="w-100 flex-grow-1 d-flex flex-column">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 py-4">

                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h2 class="fw-bold mb-1" style="font-family: 'Rubik', sans-serif;">Command Center</h2>
                        <p class="mb-0" style="color: var(--text-secondary);">Pantau aktivitas kelas dan atur sesi
                            pembelajaran Anda.</p>
                    </div>
                    <button class="btn btn-outline-light btn-sm fw-semibold"
                        style="border-color: var(--border-hairline);">+ Buat Pengumuman</button>
                </div>

                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="card p-4 h-100 border-0" style="background-color: var(--color-surface);">
                            <h5 class="fw-bold mb-4">Sesi Mendatang <span class="badge-lime ms-2">LIVE</span></h5>

                            <div class="d-flex align-items-center p-4 rounded mb-4"
                                style="background-color: var(--bg-canvas); border: 1px solid var(--border-hairline);">
                                <div class="me-4 text-center">
                                    <h4 class="fw-bold mb-0 text-white">15:20</h4>
                                    <small style="color: var(--text-secondary);">WIB</small>
                                </div>
                                <div class="flex-grow-1 border-start border-hairline ps-4">
                                    <h5 class="fw-bold mb-1">Front-end React & Tailwind</h5>
                                    <p class="small mb-0" style="color: var(--text-secondary);"><i
                                            class="ph ph-users me-1"></i> 45 Mahasiswa Enrolled</p>
                                </div>
                            </div>

                            <a href="attendance-projection.html"
                                class="btn btn-primary w-100 py-3 fs-5 shadow-lg d-flex justify-content-center align-items-center gap-2 text-decoration-none">
                                <i class="ph-bold ph-qr-code"></i> Buka Sesi & Absensi QR
                            </a>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="card p-4 h-100 border-0" style="background-color: var(--color-surface);">
                            <h5 class="fw-bold mb-4">Menunggu Penilaian</h5>

                            <div class="list-group list-group-flush">
                                <a href="#"
                                    class="list-group-item bg-transparent px-0 py-3 border-bottom border-hairline d-flex justify-content-between align-items-center text-decoration-none">
                                    <div>
                                        <h6 class="fw-bold mb-1 text-white">Landing Page Empact</h6>
                                        <small style="color: var(--text-secondary);">Front-end React</small>
                                    </div>
                                    <span class="badge-lime fs-6">12</span>
                                </a>
                                <a href="#"
                                    class="list-group-item bg-transparent px-0 py-3 border-bottom border-hairline d-flex justify-content-between align-items-center text-decoration-none">
                                    <div>
                                        <h6 class="fw-bold mb-1 text-white">Wireframing Agilis</h6>
                                        <small style="color: var(--text-secondary);">UI/UX Research</small>
                                    </div>
                                    <span class="badge-lime fs-6">28</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>

</html>
